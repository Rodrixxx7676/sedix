name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sedix
          POSTGRES_PASSWORD: sedix
          POSTGRES_DB: sedix_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/Sedix.sln

      - name: Build
        run: dotnet build backend/Sedix.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/Sedix.sln --no-build --configuration Release
        env:
          ConnectionStrings__DefaultConnection: >
            Host=localhost;Port=5432;Database=sedix_test;
            Username=sedix;Password=sedix
